<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Apps - Developer</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
}

.container {
    padding: 50px 20px;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
    opacity: 0.9;
}

.card {
    background: rgba(255,255,255,0.1);
    margin: 30px auto;
    padding: 20px;
    border-radius: 15px;
    max-width: 400px;
    backdrop-filter: blur(10px);
}

.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background: #ffcc00;
    color: black;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

<h1>My Mobile Apps</h1>
<p>Welcome to my developer website</p>

<div class="card">
    <h2>📱 My Application</h2>
    <p>Educational and entertainment apps for everyone.</p>
    <a class="btn" href="#">Download App</a>
</div>

<div class="card">
    <h2>📧 Contact</h2>
    <p>Email: your@email.com</p>
</div>

</div>

</body>
</html>
